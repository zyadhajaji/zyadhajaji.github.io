An HTML table displaying solar system planet data including thead, tbody,
caption, colgroup, rowspan, colspan, and scope attributes.
-->

<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width">
    <title>Planets Data</title>
    <link href="minimal-table.css" rel="stylesheet" type="text/css">
  </head>
  <body>
    <h1>Planets Data</h1>
    <table>
      <caption>Data about the planets of our solar system (Planetary facts taken from
        <a href="https://nssdc.gsfc.nasa.gov/planetary/factsheet/">Nasa's Planetary Fact Sheet - Metric</a>).
      </caption>
      <colgroup>
        <col span="2">
        <col style="border: 2px solid black">
        <col span="9">
      </colgroup>
      <thead>
        |<tr>
           <td colspan="2"></td>
           <th scope="col">Name</th>
           <th scope="col">Mass (10<sup>24</sup>kg)</th>
           <th scope="col">Diameter (km)</th>
           <th scope="col">Density (kg/m<sup>3</sup>)</th>
           <th scope="col">Gravity (m/s<sup>2</sup>)</th>
           <th scope="col">Length of day (hours)</th>
           <th scope="col">Distance from Sun (10<sup>6</sup>km)</th>
           <th scope="col">Mean temperature (°C)</th>
           <th scope="col">Number of moons</th>
           <th scope="col">Notes</th>
        </tr>
      <thead>
      </thead>
      <tbody>
      </tbody>
    </table>
   

  </body>
</html>
